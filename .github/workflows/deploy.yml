name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  detect-changes:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.backend }}
      frontend: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docker-compose.yml'
              - '.github/workflows/**'
            frontend:
              - 'frontend/**'
              - 'docker-compose.yml'
              - '.github/workflows/**'

  backend-test:
    name: backend-test
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.13"

      - name: Install dependencies
        run: uv sync

      - name: Test
        run: uv run pytest

  frontend-build:
    name: frontend-build
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24.17.0"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

  frontend-test:
    name: frontend-test
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24.17.0"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Test
        run: yarn test

  deploy:
    name: deploy
    needs: [detect-changes, backend-test, frontend-build, frontend-test]
    if: |
      always() &&
      needs.detect-changes.result == 'success' &&
      (needs.backend-test.result == 'success' || needs.backend-test.result == 'skipped') &&
      (needs.frontend-build.result == 'success' || needs.frontend-build.result == 'skipped') &&
      (needs.frontend-test.result == 'success' || needs.frontend-test.result == 'skipped') &&
      (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/textgenie
            git pull origin main

            SERVICES=""
            if [ "${{ needs.detect-changes.outputs.backend }}" = "true" ]; then
              SERVICES="$SERVICES backend"
            fi
            if [ "${{ needs.detect-changes.outputs.frontend }}" = "true" ]; then
              SERVICES="$SERVICES frontend"
            fi

            docker compose build $SERVICES
            docker compose up -d $SERVICES
            docker image prune -f

      - name: Healthcheck
        run: |
          sleep 10

          check_health() {
            local url=$1
            local name=$2
            local status
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "$url")
            if [ "$status" -ge 200 ] && [ "$status" -lt 400 ]; then
              echo "$name: OK ($status)"
              return 0
            else
              echo "$name: FAILED ($status)"
              return 1
            fi
          }

          for attempt in 1 2 3; do
            echo "Attempt $attempt/3"
            failed=0
            check_health "https://textgenie.muhib.me" "Frontend" || failed=1
            check_health "https://textgenie.muhib.me/api/health" "Backend" || failed=1

            if [ "$failed" -eq 0 ]; then
              echo "All healthchecks passed"
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "Retrying in 3 seconds..."
              sleep 3
            fi
          done

          echo "Healthchecks failed after 3 attempts"
          exit 1
