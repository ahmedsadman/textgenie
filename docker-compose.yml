services:
  db:
    image: mysql:8.4.5
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: textgenie
      MYSQL_USER: textgenie
      MYSQL_PASSWORD: textgenie
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  backend:
    image: ghcr.io/ahmedsadman/textgenie-backend:${IMAGE_TAG:-latest}
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=mysql+pymysql://textgenie:textgenie@db:3306/textgenie?charset=utf8mb4
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - WEBHOOK_BASE_URL=${WEBHOOK_BASE_URL:-http://localhost:8080}
    networks:
      - app-network

  frontend:
    image: ghcr.io/ahmedsadman/textgenie-frontend:${IMAGE_TAG:-latest}
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  db-data:

networks:
  app-network:
    driver: bridge
