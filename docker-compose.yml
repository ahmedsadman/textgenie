services:
  backend:
    build:
      context: ./backend
      target: production
    expose:
      - "8000"
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      target: production
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
