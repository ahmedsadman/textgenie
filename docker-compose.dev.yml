services:
  backend:
    build:
      context: ./backend
      target: dev
    volumes:
      - ./backend/app:/app/app
    ports:
      - "8001:8000"
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      target: dev
    volumes:
      - ./frontend/src:/app/src
    ports:
      - "5174:5174"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://backend:8000
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
